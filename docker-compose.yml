services:
  docs-generate:
    build:
      context: .
      dockerfile: containers/web/Dockerfile
      target: docs-generate
    working_dir: /app/backend
    command: ["/usr/local/go/bin/go", "run", ".", "docs:generate"]
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
      - docs_generate_cache:/tmp/goforj-docs
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped

  openinary:
    image: openinary/openinary:latest
    platform: linux/amd64
    environment:
      BETTER_AUTH_SECRET: ${OPENINARY_BETTER_AUTH_SECRET:?Set OPENINARY_BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://img.${DOMAIN}
      API_SECRET: ${OPENINARY_API_SECRET:?Set OPENINARY_API_SECRET}
      DB_PATH: /app/data/auth.db
      MAX_FILE_SIZE_MB: ${OPENINARY_MAX_FILE_SIZE_MB:-50}
      PUBLIC_RATE_LIMIT_MAX: ${OPENINARY_PUBLIC_RATE_LIMIT_MAX:-200}
      PUBLIC_RATE_LIMIT_WINDOW_MS: ${OPENINARY_PUBLIC_RATE_LIMIT_WINDOW_MS:-60000}
    volumes:
      - ./_data/openinary/cache:/app/apps/api/cache
      - ./_data/openinary/public:/app/apps/api/public
      - ./_data/openinary/db:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.openinary-public.rule=Host(`img.${DOMAIN}`) && (PathPrefix(`/t/`) || PathPrefix(`/download/`) || PathPrefix(`/authenticated/`) || Path(`/health`))
      - traefik.http.routers.openinary-public.entrypoints=websecure
      - traefik.http.routers.openinary-public.tls.certresolver=le
      - traefik.http.routers.openinary-public.priority=100
      - traefik.http.routers.openinary-admin.rule=Host(`img.${DOMAIN}`)
      - traefik.http.routers.openinary-admin.entrypoints=websecure
      - traefik.http.routers.openinary-admin.tls.certresolver=le
      - traefik.http.routers.openinary-admin.priority=1
      - traefik.http.routers.openinary-http.rule=Host(`img.${DOMAIN}`)
      - traefik.http.routers.openinary-http.entrypoints=web
      - traefik.http.routers.openinary-http.middlewares=openinary-redirect-to-https
      - traefik.http.middlewares.openinary-redirect-to-https.redirectscheme.scheme=https
      - traefik.http.services.openinary.loadbalancer.server.port=3000
    restart: unless-stopped
    depends_on:
      - traefik

  web:
    image: ${DOCKER_PROD_IMAGE:-docs-web:latest}
    build:
      context: .
      dockerfile: containers/web/Dockerfile
      args:
        GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID}
    environment:
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID}
      GA_API_SECRET: ${GA_API_SECRET}
    labels:
      - traefik.enable=true
      - traefik.http.routers.goforj.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.goforj.entrypoints=websecure
      - traefik.http.routers.goforj.tls.certresolver=le
      - traefik.http.routers.goforj-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.goforj-http.entrypoints=web
      - traefik.http.routers.goforj-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.services.goforj.loadbalancer.server.port=3000
    restart: unless-stopped
    depends_on:
      - traefik

volumes:
  traefik_letsencrypt:
  docs_generate_cache:
  go_mod_cache:
  go_build_cache:
